# Verso Platform — Core Infrastructure
# Usage: docker compose -f deploy/docker-compose.yml up -d
# Requires: platform/.env (copy from .env.example)

x-common-env: &common-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  REDPANDA_BROKERS: redpanda:9092
  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

networks:
  verso-net:
    driver: bridge
    name: verso-net

volumes:
  pg-data:
  redis-data:
  redpanda-data:
  opensearch-data:
  minio-data:

services:
  # ─── Postgres + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:${PG_VERSION}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=4
      - -c
      - max_replication_slots=4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init/01-init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql
      - ./init/02-service-schemas.sql:/docker-entrypoint-initdb.d/02-service-schemas.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    networks: [verso-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:${REDIS_VERSION}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT}:6379"
    networks: [verso-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redpanda (Kafka API) ───────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:${REDPANDA_VERSION}
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:${REDPANDA_EXTERNAL_PORT}
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "${REDPANDA_EXTERNAL_PORT}:19092"
      - "${REDPANDA_SCHEMA_REGISTRY_PORT}:8081"
    networks: [verso-net]
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redpanda Console ───────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:${REDPANDA_CONSOLE_VERSION}
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${REDPANDA_CONSOLE_PORT}:8080"
    networks: [verso-net]
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OpenSearch ──────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION}
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT}:9200"
    networks: [verso-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OpenSearch Dashboards ──────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION}
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT}:5601"
    networks: [verso-net]
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── MinIO (S3-compatible object store) ─────────────────────────────
  minio:
    image: minio/minio:${MINIO_VERSION}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    networks: [verso-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Traefik (API gateway / reverse proxy) ──────────────────────────
  traefik:
    image: traefik:${TRAEFIK_VERSION}
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=verso-net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      - --api.insecure=true
      - --ping=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    networks: [verso-net]
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MailHog (email testing) ────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:${MAILHOG_VERSION}
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks: [verso-net]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8025/api/v2/messages || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Debezium Connect (CDC) ─────────────────────────────────────────
  debezium:
    image: debezium/connect:${DEBEZIUM_VERSION}
    environment:
      KAFKA_HEAP_OPTS: -Xms256m -Xmx256m
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: verso-connect
      CONFIG_STORAGE_TOPIC: verso_connect_configs
      OFFSET_STORAGE_TOPIC: verso_connect_offsets
      STATUS_STORAGE_TOPIC: verso_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "${DEBEZIUM_PORT}:8083"
    networks: [verso-net]
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Identity Service ─────────────────────────────────────────────────
  verso-identity-service:
    build:
      context: ..
      dockerfile: services/verso-identity-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=identity&sslmode=disable
      PORT: "8001"
      JWT_KEY_PATH: /tmp/verso-jwt-key.pem
      JWT_EXPIRY: ${IDENTITY_JWT_EXPIRY}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.identity.rule=PathPrefix(`/v1/auth`) || PathPrefix(`/.well-known`)"
      - "traefik.http.services.identity.loadbalancer.server.port=8001"
    networks: [verso-net]

  # ─── Catalog Service ──────────────────────────────────────────────────
  verso-catalog-service:
    build:
      context: ..
      dockerfile: services/verso-catalog-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=catalog&sslmode=disable
      PORT: "8002"
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog.rule=PathPrefix(`/v1/works`) || PathPrefix(`/v1/editions`)"
      - "traefik.http.services.catalog.loadbalancer.server.port=8002"
    networks: [verso-net]

  # ─── Search Service ───────────────────────────────────────────────────
  verso-search-service:
    build:
      context: ..
      dockerfile: services/verso-search-service/Dockerfile
    environment:
      <<: *common-env
      PORT: "8003"
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      opensearch:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.rule=PathPrefix(`/v1/search`)"
      - "traefik.http.services.search.loadbalancer.server.port=8003"
    networks: [verso-net]

  # ─── Profile Service ──────────────────────────────────────────────────
  verso-profile-service:
    build:
      context: ..
      dockerfile: services/verso-profile-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=profile&sslmode=disable
      SERVICE_PORT: ${PROFILE_SERVICE_PORT}
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profile.rule=PathPrefix(`/v1/profiles`)"
      - "traefik.http.services.profile.loadbalancer.server.port=${PROFILE_SERVICE_PORT}"
    networks: [verso-net]

  # ─── Library Service ──────────────────────────────────────────────────
  verso-library-service:
    build:
      context: ..
      dockerfile: services/verso-library-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=library&sslmode=disable
      SERVICE_PORT: ${LIBRARY_SERVICE_PORT}
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.library.rule=PathPrefix(`/v1/library`)"
      - "traefik.http.services.library.loadbalancer.server.port=${LIBRARY_SERVICE_PORT}"
    networks: [verso-net]

  # ─── Review Service ───────────────────────────────────────────────────
  verso-review-service:
    build:
      context: ..
      dockerfile: services/verso-review-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=review&sslmode=disable
      SERVICE_PORT: ${REVIEW_SERVICE_PORT}
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.review.rule=PathPrefix(`/v1/reviews`) || (PathPrefix(`/v1/works`) && PathRegexp(`/v1/works/[^/]+/(reviews|aggregate-rating)`))"
      - "traefik.http.services.review.loadbalancer.server.port=${REVIEW_SERVICE_PORT}"
    networks: [verso-net]

  # ─── Social Service ────────────────────────────────────────────────────
  verso-social-service:
    build:
      context: ..
      dockerfile: services/verso-social-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=social&sslmode=disable
      SERVICE_PORT: ${SOCIAL_SERVICE_PORT}
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.social.rule=PathPrefix(`/v1/social`)"
      - "traefik.http.services.social.loadbalancer.server.port=${SOCIAL_SERVICE_PORT}"
    networks: [verso-net]

  # ─── Web BFF (Node/Fastify aggregation proxy) ──────────────────────────
  web-bff:
    build:
      context: ../services/web-bff
      dockerfile: Dockerfile
    ports:
      - "${BFF_PORT}:8010"
    environment:
      PORT: "8010"
      IDENTITY_SERVICE_URL: http://verso-identity-service:8001
      CATALOG_SERVICE_URL: http://verso-catalog-service:8002
      SEARCH_SERVICE_URL: http://verso-search-service:8003
      PROFILE_SERVICE_URL: http://verso-profile-service:${PROFILE_SERVICE_PORT}
    depends_on:
      verso-identity-service:
        condition: service_healthy
      verso-catalog-service:
        condition: service_healthy
      verso-search-service:
        condition: service_healthy
      verso-profile-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=PathPrefix(`/api`)"
      - "traefik.http.services.bff.loadbalancer.server.port=8010"
    networks: [verso-net]

  # ─── Media Service (Node/Fastify — media upload via MinIO) ─────────────
  verso-media-service:
    build:
      context: ../services/verso-media-service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgres://verso:${POSTGRES_PASSWORD}@postgres:5432/verso?search_path=media&sslmode=disable
      SERVICE_PORT: ${MEDIA_SERVICE_PORT}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWKS_URL: http://verso-identity-service:8001/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      verso-identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MEDIA_SERVICE_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=PathPrefix(`/v1/media`)"
      - "traefik.http.services.media.loadbalancer.server.port=${MEDIA_SERVICE_PORT}"
    networks: [verso-net]

  # ═══════════════════════════════════════════════════════════════════════
  # Profile: observability
  # Usage: docker compose --profile observability up -d
  # ═══════════════════════════════════════════════════════════════════════

  # ─── OpenTelemetry Collector ─────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
    networks: [verso-net]
    profiles: [observability]

  # ─── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks: [verso-net]
    profiles: [observability]

  # ─── Loki ────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:${LOKI_VERSION}
    ports:
      - "${LOKI_PORT}:3100"
    networks: [verso-net]
    profiles: [observability]

  # ─── Tempo ───────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:${TEMPO_VERSION}
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "${TEMPO_PORT}:3200"
    networks: [verso-net]
    profiles: [observability]

  # ─── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    networks: [verso-net]
    depends_on:
      - prometheus
      - loki
      - tempo
    profiles: [observability]

  # ═══════════════════════════════════════════════════════════════════════
  # Profile: ai-local
  # Usage: docker compose --profile ai-local up -d
  # ═══════════════════════════════════════════════════════════════════════

  # ─── Ollama ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    ports:
      - "${OLLAMA_PORT}:11434"
    networks: [verso-net]
    profiles: [ai-local]
